version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: saturday
      time: "09:00"
      timezone: America/New_York
    target-branch: updates/dependencies
    commit-message:
      prefix: ci
      include: scope
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: saturday
      time: "09:00"
      timezone: America/New_York
    target-branch: updates/dependencies
    commit-message:
      prefix: build
      prefix-development: build
      include: scope
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

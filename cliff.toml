# git-cliff configuration — https://git-cliff.org/docs/configuration
# Conventional-Commits changelog, Keep a Changelog style.

[changelog]
# Rendered once at the top of the file.
header = """
# Changelog

All notable changes to this project are documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).
"""

# Rendered once per release. Tera template.
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}**{{ commit.scope }}:** {% endif %}\
          {% if commit.breaking %}[**breaking**] {% endif %}\
          {{ commit.message | upper_first }}\
    {% endfor %}
{% endfor %}\n
"""

# Rendered once at the very bottom.
footer = ""

# Remove leading/trailing whitespace from the body.
trim = true

# Postprocessors run over the final rendered changelog.
postprocessors = [
    # Collapse 3+ blank lines down to a single blank line.
    { pattern = '\n{3,}', replace = "\n\n" },
]

[git]
# Parse commits as Conventional Commits.
conventional_commits = true
# Keep non-conventional commits too (they fall through to the "Other" group below)
# so a real change is never silently dropped from the changelog.
filter_unconventional = false
# Don't split a commit body into multiple changelog entries.
split_commits = false

# Run over each commit message before parsing.
commit_preprocessors = [
    # Turn "(#123)" PR references into GitHub links.
    { pattern = '\(#([0-9]+)\)', replace = "([#${1}](https://github.com/neuroticsasquat-ch/upcoming-movies-frontend/pull/${1}))" },
    # Trim trailing whitespace.
    { pattern = ' +$', replace = "" },
]

# Group commits into sections. First match wins; order matters.
commit_parsers = [
    { message = "^Merge ", skip = true },
    { message = "^chore\\(release\\)", skip = true },
    { message = "^chore\\(deps\\)", skip = true },
    { message = "^chore\\(deps-dev\\)", skip = true },

    # The `<!-- N -->` prefixes only control section ordering; the template's
    # `striptags` filter removes them so the rendered headings stay clean.
    { message = "^feat", group = "<!-- 00 -->Features" },
    { message = "^fix", group = "<!-- 01 -->Bug Fixes" },
    { message = "^perf", group = "<!-- 02 -->Performance" },
    { message = "^refactor", group = "<!-- 03 -->Refactor" },
    { message = "^docs", group = "<!-- 04 -->Documentation" },
    { message = "^style", group = "<!-- 05 -->Styling" },
    { message = "^test", group = "<!-- 06 -->Testing" },
    { message = "^build", group = "<!-- 07 -->Build System" },
    { message = "^ci", group = "<!-- 08 -->CI" },
    { message = "^revert", group = "<!-- 09 -->Reverts" },
    { message = "^chore", group = "<!-- 10 -->Miscellaneous" },

    # Anything else (incl. non-conventional history) lands here.
    { message = ".*", group = "<!-- 11 -->Other" },
]

# Don't require commits to be tagged to appear.
protect_breaking_commits = false
filter_commits = false

# Only consider tags shaped like v1.2.3.
tag_pattern = "v[0-9]*"

# Process commits newest-tag-first but list commits oldest→newest within a release.
topo_order = false
sort_commits = "oldest"
